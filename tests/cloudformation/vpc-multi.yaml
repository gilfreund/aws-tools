AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ecTools integration test — additional VPCs for multi-VPC scenario.
  Creates two more VPCs (VPC-A and VPC-B), each with a private subnet.
  Together with vpc-single.yaml this gives three VPCs, which triggers
  ecLaunch's interactive VPC selection menu.

Parameters:
  VpcACidr:
    Type: String
    Default: "10.20.0.0/16"

  VpcBCidr:
    Type: String
    Default: "10.30.0.0/16"

  PrivateSubnetACidr:
    Type: String
    Default: "10.20.1.0/24"

  PrivateSubnetBCidr:
    Type: String
    Default: "10.30.1.0/24"

  PublicSubnetACidr:
    Type: String
    Default: "10.20.101.0/24"

  PublicSubnetBCidr:
    Type: String
    Default: "10.30.101.0/24"

Resources:

  # ---------------------------------------------------------------------------
  # VPC A
  # ---------------------------------------------------------------------------
  VpcA:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcACidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ectools-test-vpc-a
        - Key: purpose
          Value: ectools-integration-test

  IgwA:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ectools-test-igw-a

  IgwAAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VpcA
      InternetGatewayId: !Ref IgwA

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcA
      CidrBlock: !Ref PrivateSubnetACidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: ectools-test-private-a
        - Key: purpose
          Value: ectools-integration-test

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcA
      CidrBlock: !Ref PublicSubnetACidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ectools-test-public-a
        - Key: purpose
          Value: ectools-integration-test

  PublicRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcA
      Tags:
        - Key: Name
          Value: ectools-test-public-rt-a

  PublicRouteA:
    Type: AWS::EC2::Route
    DependsOn: IgwAAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTableA
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref IgwA

  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTableA

  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcA
      Tags:
        - Key: Name
          Value: ectools-test-private-rt-a

  SubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  # ---------------------------------------------------------------------------
  # VPC B
  # ---------------------------------------------------------------------------
  VpcB:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcBCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ectools-test-vpc-b
        - Key: purpose
          Value: ectools-integration-test

  IgwB:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ectools-test-igw-b

  IgwBAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VpcB
      InternetGatewayId: !Ref IgwB

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcB
      CidrBlock: !Ref PrivateSubnetBCidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: ectools-test-private-b
        - Key: purpose
          Value: ectools-integration-test

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcB
      CidrBlock: !Ref PublicSubnetBCidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ectools-test-public-b
        - Key: purpose
          Value: ectools-integration-test

  PublicRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcB
      Tags:
        - Key: Name
          Value: ectools-test-public-rt-b

  PublicRouteB:
    Type: AWS::EC2::Route
    DependsOn: IgwBAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTableB
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref IgwB

  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTableB

  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcB
      Tags:
        - Key: Name
          Value: ectools-test-private-rt-b

  SubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB

Outputs:
  VpcAId:
    Value: !Ref VpcA
    Export:
      Name: !Sub "${AWS::StackName}-VpcAId"

  VpcBId:
    Value: !Ref VpcB
    Export:
      Name: !Sub "${AWS::StackName}-VpcBId"

  PrivateSubnetAId:
    Value: !Ref PrivateSubnetA
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnetAId"

  PrivateSubnetBId:
    Value: !Ref PrivateSubnetB
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnetBId"

  PublicSubnetAId:
    Value: !Ref PublicSubnetA
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnetAId"

  PublicSubnetBId:
    Value: !Ref PublicSubnetB
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnetBId"
