name: Tests

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [master]

jobs:
  bats:
    name: bats test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Run tests
        run: bats --tap tests/test_*.bats
